UiPage: "OpenMW VR UI settings"
UiPageDescription: "Settings related to UI in VR"

SpacesGroup: "VR Spaces"
OtherGroup: "Other Spaces"
UiGroup: "Other UI"

HUDSpace: "HUD Space"
HUDSpaceDescription: |
    Where in space the hud should appear. Note that all Wrist options require motion controllers, and do not work in KB+Mouse or gamepad mode.

TooltipSpace: "Tooltip Space"
TooltipSpaceDescription: |
    Where in space tooltips should appear. Note that all Wrist options require motion controllers, and do not work in KB+Mouse or gamepad mode.
    
DialogueSpace: "Lower dialogue window"
DialogueSpaceDescription: |
    Lower the dialogue window somewhat to avoid blocking the view of the NPC's head. Can improve immersion, especially with some mods that make the scene less static during dialogue.

ShowTutorials: "Show Tutorials"
ShowTutorialsDescription: |
    Show a few tutorial messages when a character is loaded into VR for the first time (including new game).

SpaceOffsetGroup: "Space Offsets"
SpaceOffsetGroupDescription: |
    Adjust the exact position of the HUD/Tooltip using these settings. A position is only possible to adjust if there is currently something
    assigned to it.
SpaceOffsetRecordingDialogue1: "New offset is: {offset}"
SpaceOffsetRecordingDialogue2Keyboard: "Press Enter to accept, or Esc to cancel"
SpaceOffsetRecordingDialogue2Mouse: "Press Left Mouse Button to accept, or Right Mouse Button to cancel"
SpaceOffsetRecordingDialogue2Controller: "Press A or Start to accept, or B or Back to cancel"
SpaceOffsetRecordingDialogue2MC: "Press {AcceptBinding} to accept, or {CancelBinding} to cancel. Or use your keyboard and press Enter to accept, or Esc to cancel"

NotBound: "Not Bound"
NoBinding: "No Binding"
